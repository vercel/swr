name: 'Install'
description: 'Set up and install dependencies'
runs:
  using: composite
  steps:
    - name: Setup pnpm
      uses: pnpm/action-setup@v6.0.8

    - name: Lock Corepack version
      shell: bash
      run: pnpm i -g corepack@0.31.0

    - name: Use Node.js 24
      uses: actions/setup-node@v6.4.0
      with:
        node-version: 24
        cache: pnpm

    - name: Install Dependencies
      shell: bash
      run: |
        corepack enable
        node -v
        pnpm -v
        pnpm install
