on:
  workflow_dispatch:

name: Publish

# OIDC trusted publishing. The trusted publisher on npmjs.org is configured for
# this workflow filename (trigger-release.yml), so the npm publish must live here.
permissions:
  id-token: write
  contents: read

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6.0.2

      - name: Install
        uses: ./.github/workflows/install

      # OIDC trusted publishing requires npm >= 11.5.1
      - name: Install npm 11
        run: npm install -g npm@11

      - name: Build
        run: |
          pnpm clean
          pnpm build

      # Derive the dist-tag from the version in package.json: a prerelease like
      # 2.5.0-beta.0 publishes under that identifier, a stable version to latest.
      - name: Determine tag
        id: determine_tag
        run: |
          version=$(node -p "require('./package.json').version")
          echo "tag=$(echo $version | grep -Eo 'alpha|beta|canary|rc')" >> $GITHUB_OUTPUT

      - name: Publish to versioned tag
        if: steps.determine_tag.outputs.tag != ''
        run: |
          echo "Publishing to ${{ steps.determine_tag.outputs.tag }} tag"
          npm publish --access public --no-git-checks --tag ${{ steps.determine_tag.outputs.tag }}

      - name: Publish to latest
        if: steps.determine_tag.outputs.tag == ''
        run: |
          echo "Publishing to latest"
          npm publish --access public --no-git-checks
